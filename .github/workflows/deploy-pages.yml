name: Deploy GitHub Pages

on:
  push:
    branches: ["claude/airspace-risk-dashboard-U2XUG"]
  workflow_dispatch:

permissions:
  pages: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      # Pages を「ブランチからの配信(/docs)」モードに設定する。
      # これにより GitHub 側で pages-build-deployment が自動実行され、
      # github-pages 環境の保護ルールに依存せず公開できる。
      - name: Configure Pages to serve /docs from this branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"legacy","source":{"branch":"${{ github.ref_name }}","path":"/docs"}}')
          echo "PUT /pages -> HTTP $code"; cat /tmp/resp.json || true
          # 既にブランチ未設定で PUT が 4xx の場合は POST(新規作成)で再試行
          if [ "$code" -ge 400 ]; then
            code2=$(curl -sS -o /tmp/resp2.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"legacy","source":{"branch":"${{ github.ref_name }}","path":"/docs"}}')
            echo "POST /pages -> HTTP $code2"; cat /tmp/resp2.json || true
            [ "$code2" -ge 400 ] && exit 1
          fi
